<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mobile Responsive Housie Game</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
      padding:15px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:auto;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius:25px;
      padding:20px;
      box-shadow:0 10px 35px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.1);
    }

    .title{
      text-align:center;
      margin-bottom:20px;
    }

    .title h1{
      font-size:3rem;
      background:linear-gradient(to right,#38bdf8,#f472b6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .title p{
      color:#cbd5e1;
      margin-top:8px;
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin:25px 0;
    }

    button{
      border:none;
      padding:14px 24px;
      border-radius:15px;
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      min-width:160px;
    }

    .generate-btn{
      background:linear-gradient(135deg,#06b6d4,#2563eb);
      box-shadow:0 5px 20px rgba(37,99,235,0.5);
    }

    .reset-btn{
      background:linear-gradient(135deg,#ef4444,#f97316);
      box-shadow:0 5px 20px rgba(239,68,68,0.5);
    }

    button:hover{
      transform:translateY(-3px) scale(1.03);
    }

    .current-section{
      text-align:center;
      margin-bottom:25px;
    }

    .current-section h2{
      margin-bottom:15px;
      color:#e2e8f0;
    }

    .current-number{
      width:150px;
      height:150px;
      margin:auto;
      border-radius:50%;
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:3rem;
      font-weight:bold;
      box-shadow:0 0 35px rgba(236,72,153,0.6);
      transition:0.3s;
    }

    .stats{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .stat-card{
      background:rgba(255,255,255,0.07);
      border-radius:18px;
      padding:18px;
      min-width:180px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .stat-card h3{
      color:#cbd5e1;
      margin-bottom:10px;
      font-size:1rem;
    }

    .stat-card span{
      font-size:2rem;
      font-weight:bold;
      color:#38bdf8;
    }

    /* GRID */

    .grid-container{
      overflow-x:auto;
      padding-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(10,1fr);
      gap:8px;
      min-width:700px;
    }

    .cell{
      aspect-ratio:1;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(255,255,255,0.06);
      border-radius:12px;
      font-weight:bold;
      color:#94a3b8;
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
      font-size:1rem;
    }

    .cell.active{
      background:linear-gradient(135deg,#22c55e,#06b6d4);
      color:white;
      transform:scale(1.08);
      box-shadow:0 0 15px rgba(34,197,94,0.8);
    }

    .completed{
      text-align:center;
      margin-top:20px;
      font-size:1.3rem;
      color:#4ade80;
      font-weight:bold;
      display:none;
    }

    /* MOBILE RESPONSIVE */

    @media(max-width:768px){

      body{
        padding:10px;
      }

      .container{
        padding:15px;
        border-radius:20px;
      }

      .title h1{
        font-size:2rem;
      }

      .title p{
        font-size:0.9rem;
      }

      button{
        width:100%;
        min-width:auto;
        font-size:0.95rem;
      }

      .controls{
        flex-direction:column;
      }

      .current-number{
        width:110px;
        height:110px;
        font-size:2.2rem;
      }

      .stats{
        flex-direction:column;
      }

      .stat-card{
        width:100%;
        min-width:auto;
      }

      .grid{
        min-width:100%;
        gap:5px;
      }

      .cell{
        font-size:0.75rem;
        border-radius:8px;
      }

    }

    @media(max-width:480px){

      .title h1{
        font-size:1.7rem;
      }

      .current-number{
        width:90px;
        height:90px;
        font-size:1.8rem;
      }

      .cell{
        font-size:0.65rem;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      <h1>🎯 Housie Game</h1>
    </div>

    <div class="controls">
      <button class="generate-btn" onclick="generateNumber()">
        🎲 Generate Number
      </button>

      <button class="reset-btn" onclick="resetGame()">
        🔄 Reset Game
      </button>
    </div>

    <div class="current-section">
      <h2>Current Number</h2>

      <div class="current-number" id="currentNumber">
        --
      </div>
    </div>

    <div class="stats">

      <div class="stat-card">
        <h3>Generated</h3>
        <span id="count">0</span>
      </div>

      <div class="stat-card">
        <h3>Remaining</h3>
        <span id="remaining">100</span>
      </div>

    </div>

    <div class="grid-container">
      <div class="grid" id="grid"></div>
    </div>

  </div>

  <script>

    const grid = document.getElementById("grid");
    const currentNumber = document.getElementById("currentNumber");
    const count = document.getElementById("count");
    const remaining = document.getElementById("remaining");
    const completedMessage = document.getElementById("completedMessage");

    let numbers = [];
    let generatedCount = 0;

    // CREATE GRID

    function createGrid(){

      grid.innerHTML = "";

      for(let i=1;i<=100;i++){

        const cell = document.createElement("div");

        cell.classList.add("cell");
        cell.id = `cell-${i}`;
        cell.innerText = i;

        grid.appendChild(cell);
      }
    }

    // INITIALIZE NUMBERS

    function initializeNumbers(){

      numbers = [];

      for(let i=1;i<=100;i++){
        numbers.push(i);
      }
    }

    // GENERATE NUMBER

    function generateNumber(){

      if(numbers.length === 0){

        completedMessage.style.display = "block";
        return;
      }

      const randomIndex = Math.floor(Math.random() * numbers.length);

      const number = numbers[randomIndex];

      // REMOVE TO AVOID REPETITION

      numbers.splice(randomIndex,1);

      currentNumber.innerText = number;

      generatedCount++;

      count.innerText = generatedCount;

      remaining.innerText = 100 - generatedCount;

      // MARK IN ACTUAL POSITION

      const cell = document.getElementById(`cell-${number}`);

      cell.classList.add("active");

      // ANIMATION

      currentNumber.style.transform = "scale(1.15)";

      setTimeout(()=>{
        currentNumber.style.transform = "scale(1)";
      },200);
    }

    // RESET GAME

    function resetGame(){

      initializeNumbers();

      generatedCount = 0;

      count.innerText = 0;

      remaining.innerText = 100;

      currentNumber.innerText = "--";

      completedMessage.style.display = "none";

      document.querySelectorAll(".cell").forEach(cell=>{
        cell.classList.remove("active");
      });
    }

    // INITIAL LOAD

    createGrid();

    initializeNumbers();

  </script>

</body>
</html>
